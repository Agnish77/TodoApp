{% extends "base.html" %}
{% block body %}

<nav class="navbar navbar-dark shadow-sm bg-dark">
<div class="container">
#
<a class="navbar-brand fw-bold">📝 Todo Dashboard</a>

<div class="d-flex align-items-center gap-3">

<span class="text-light small">
{{ current_user.username }}
</span>

<a href="/logout" class="btn btn-light btn-sm">
Logout
</a>

</div>
</div>
</nav>


<div class="container my-5">

<h3 class="mb-4">Your Tasks</h3>


<div class="card shadow-sm mb-4">
<div class="card-body">

<form action="/" method="POST">

<div class="row g-2">

<div class="col-md-4">
<input class="form-control" name="title" placeholder="Task title" required>
</div>

<div class="col-md-6">
<input class="form-control" name="desc" placeholder="Description">
</div>

<div class="col-md-2 d-grid">
<button class="btn btn-primary">
Add
</button>
</div>

</div>
</form>
</div>
</div>


<div class="row">

{% for todo in todos %}

<div class="col-md-6 col-lg-4 mb-4">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="fw-semibold">{{ todo.title }}</h5>

<p class="text-muted small">
{{ todo.desc }}
</p>

{% if todo.completed %}

<span class="badge bg-success">Completed</span>

{% else %}

<span class="badge bg-warning text-dark">Pending</span>

{% endif %}

<div class="mt-3 d-flex gap-2">

<a href="/toggle/{{todo.id}}" class="btn btn-sm btn-outline-success">
Done
</a>

<a href="/update/{{todo.id}}" class="btn btn-sm btn-outline-primary">
Edit
</a>

<a href="/delete/{{todo.id}}" class="btn btn-sm btn-outline-danger">
Delete
</a>

</div>

</div>
</div>
</div>

{% endfor %}

</div>

</div>


<!-- REALTIME SOCKET -->

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<script>

const socket = io();

socket.on("todo_update", function(){
location.reload();
});

</script>

{% endblock %}
