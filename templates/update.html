{% extends "base.html" %}
{% block body %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="max-width: 600px; width: 100%; border-radius: 20px;" data-aos="fade-up">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 rounded-circle p-3 d-inline-block mb-3">
                    <i class="bi bi-pencil-square text-primary fs-1"></i>
                </div>
                <h3 class="fw-bold">Edit Task</h3>
                <p class="text-muted">Update your task details</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            <i class="bi bi-info-circle-fill me-2"></i>{{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-pencil"></i> Title
                    </label>
                    <input type="text" class="form-control form-control-lg" 
                           name="title" value="{{ todo.title }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-file-text"></i> Description
                    </label>
                    <textarea class="form-control" name="desc" rows="4" 
                              placeholder="Enter task description...">{{ todo.desc }}</textarea>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-success btn-lg flex-grow-1 btn-modern">
                        <i class="bi bi-check-lg"></i> Update Task
                    </button>
                    <a href="/" class="btn btn-secondary btn-lg flex-grow-1 btn-modern">
                        <i class="bi bi-x-lg"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
