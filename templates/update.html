{% extends "base.html" %}

{% block body %}

<div class="container my-5">

<div class="card shadow-sm">

<div class="card-body">

<h4 class="mb-4">Edit Task</h4>

<form method="POST">

<div class="mb-3">
<label class="form-label">Title</label>
<input class="form-control" name="title" value="{{todo.title}}">
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<input class="form-control" name="desc" value="{{todo.desc}}">
</div>

<button class="btn btn-success btn-modern">
Update
</button>

<a href="/" class="btn btn-secondary btn-modern">
Cancel
</a>

</form>

</div>
</div>
</div>

{% endblock %}
