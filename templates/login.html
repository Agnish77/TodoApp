{% extends "base.html" %}
{% block body %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow-lg border-0" style="max-width: 420px; width: 100%;">
        <div class="card-body p-5">
            
            <!-- App Name at Top -->
            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="bi bi-check2-square fs-1" style="color: #667eea;"></i>
                </div>
                <h1 class="fw-bold" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                    TaskForge
                </h1>
                <p class="text-muted mt-2">Welcome back</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'message' else 'danger' }} alert-dismissible fade show">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-person"></i> Username
                    </label>
                    <input type="text" name="username" class="form-control" 
                           placeholder="Enter your username" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">
                        <i class="bi bi-key"></i> Password
                    </label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" 
                               class="form-control" placeholder="Enter your password" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-modern">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <p class="text-center mt-4 small">
                Don't have an account? 
                <a href="/signup" class="text-decoration-none fw-semibold">Create account</a>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.querySelector('i').classList.toggle('bi-eye');
    this.querySelector('i').classList.toggle('bi-eye-slash');
});
</script>
{% endblock %}
